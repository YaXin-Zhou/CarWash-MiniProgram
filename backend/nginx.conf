# /etc/nginx/sites-available/carwash
# 启用: sudo ln -s /etc/nginx/sites-available/carwash /etc/nginx/sites-enabled/
# 重载: sudo nginx -t && sudo nginx -s reload

server {
    listen 80;
    server_name carwash.example.com;   # 改为你的域名
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name carwash.example.com;   # 改为你的域名

    ssl_certificate     /etc/ssl/carwash.pem;   # SSL 证书路径
    ssl_certificate_key /etc/ssl/carwash.key;   # SSL 私钥路径

    # 静态文件（上传的图片）
    location /uploads/ {
        alias /opt/carwash/backend/uploads/;
    }

    # 管理后台
    location /admin/ {
        alias /opt/carwash/admin/;
        try_files $uri /admin/index.html;
    }

    # 后端 API
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 根路径 → 管理后台
    location / {
        return 301 /admin/;
    }
}
